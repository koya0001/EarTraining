<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- ★ iPhone対応（これ重要） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>コード耳トレ</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-size: 22px;
  line-height: 1.6;
  margin: 10px;
  font-family: sans-serif;
}

button {
  font-size: 20px;
  padding: 14px;
  margin: 6px 0;
  width: 100%;
}

select {
  font-size: 18px;
  padding: 8px;
  width: 100%;
  margin-bottom: 10px;
}

h1 {
  font-size: 24px;
}
</style>
</head>

<body>

<h1>コード進行 耳トレ</h1>

<button onclick="playProgression()">再生</button>
<button onclick="showAnswer()">答えを見る</button>

<p id="answer" style="display:none;"></p>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

const chords = {
  "I": [261.63, 329.63, 392.00],
  "ii": [293.66, 349.23, 440.00],
  "iii": [329.63, 392.00, 493.88],
  "IV": [349.23, 440.00, 523.25],
  "V": [392.00, 493.88, 587.33],
  "vi": [440.00, 523.25, 659.25]
};

let currentProgression = [];

function playChord(freqs, time) {
  freqs.forEach(freq => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle"; // 少しギターっぽい
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.2, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 1);

    osc.start(time);
    osc.stop(time + 1);
  });
}

function randomProgression() {
  const keys = Object.keys(chords);
  let result = [];
  for (let i = 0; i < 4; i++) {
    result.push(keys[Math.floor(Math.random() * keys.length)]);
  }
  return result;
}

function playProgression() {
  if (ctx.state === "suspended") {
    ctx.resume();
  }

  document.getElementById("answer").style.display = "none";

  currentProgression = randomProgression();

  let now = ctx.currentTime;

  currentProgression.forEach((chord, i) => {
    playChord(chords[chord], now + i * 1.2);
  });
}

function showAnswer() {
  const ans = document.getElementById("answer");
  ans.innerText = currentProgression.join(" - ");
  ans.style.display = "block";
}
</script>

</body>
</html>
